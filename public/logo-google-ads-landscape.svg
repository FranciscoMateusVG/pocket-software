<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <!-- Background -->
  <rect width="1200" height="300" rx="24" fill="#1A1714"/>

  <!-- Subtle copper glow behind P -->
  <circle cx="180" cy="150" r="100" fill="none" stroke="rgba(200,149,108,0.08)" stroke-width="60"/>

  <!-- P mark on the left -->
  <text
    x="180"
    y="210"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="200"
    font-weight="bold"
    fill="#E8B86D"
  >P</text>

  <!-- Copper accent line (vertical divider) -->
  <rect x="320" y="70" width="2.5" height="160" rx="1.25" fill="#C8956C" opacity="0.4"/>

  <!-- Wordmark -->
  <text
    x="370"
    y="165"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="bold"
    letter-spacing="3"
    fill="#F0EBE3"
  >Pocket Software</text>

  <!-- Tagline -->
  <text
    x="370"
    y="215"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#A8A299"
  >Software feito exclusivamente para você.</text>
</svg>
